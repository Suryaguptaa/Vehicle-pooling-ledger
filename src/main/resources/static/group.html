<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairSplit | Group Details</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .group-header-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .action-btn { padding: 0.5rem 1rem; font-size: 0.9rem; }
    </style>
<script>if(localStorage.getItem('theme')==='dark') document.documentElement.setAttribute('data-theme', 'dark');</script>
</head>
<body>
    <!-- Sidebar injected via JS -->

    <div class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1.5rem; margin-bottom: 2rem;">
            <div>
                <h2 id="groupName" style="font-size: 1.5rem; margin-bottom: 0.5rem;">Loading...</h2>
                <div style="display: flex; gap: 0.5rem; align-items: center; background: var(--input-bg); padding: 0.4rem 0.8rem; border-radius: 8px; border: 1px solid var(--border); width: fit-content;">
                    <span class="text-muted" id="groupCode" style="font-family: monospace; font-size: 0.95rem;"></span>
                    <button onclick="copyInvite()" class="btn-icon" title="Copy Invite Code" style="padding: 0.2rem;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                    </button>
                    <button onclick="regenerateCode()" class="btn-icon" title="Regenerate Invite Code" style="padding: 0.2rem;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></svg>
                    </button>
                </div>
            </div>
            <div class="group-header-actions" style="display: flex; gap: 0.75rem; align-items: center;">
                <a href="#" id="addExpenseBtn" class="btn" style="display: inline-flex; align-items: center; gap: 0.5rem; background: var(--primary); color: white; border: none; padding: 0.6rem 1rem;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                    Add Expense
                </a>
                <a href="#" id="settleBtn" class="btn" style="display: inline-flex; align-items: center; gap: 0.5rem; background: var(--success); color: white; border: none; padding: 0.6rem 1rem;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
                    Settle Up
                </a>
                <button onclick="deleteGroup()" class="btn-icon danger" title="Delete Group" style="color: var(--text-muted);">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                </button>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
            <div class="card">
                <h3 class="mb-2">How to Settle Up</h3>
                <div id="debtsContainer">
                    <p class="text-muted">Calculating debts...</p>
                </div>
            </div>
            <div class="card">
                <h3 class="mb-2">Members</h3>
                <div id="membersContainer"></div>
            </div>
        </div>

        <div class="card" style="margin-top: 2rem;">
            <h3 style="margin-bottom: 1rem;">Recent Expenses</h3>
            <div style="display: flex; flex-direction: column; gap: 0.5rem;" id="expensesContainer"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        checkAuth();
        renderSidebar('groups');

        const params = new URLSearchParams(window.location.search);
        const groupId = params.get('id');
        const currentUser = JSON.parse(localStorage.getItem('user'));
        let currentInviteCode = '';

        if (!groupId) navigateTo('groups.html');

        document.getElementById('addExpenseBtn').href = `add-expense.html?groupId=${groupId}`;
        document.getElementById('settleBtn').href = `settle.html?groupId=${groupId}`;

        async function loadGroupData() {
            try {
                const group = await apiFetch(`/groups/${groupId}`);
                document.getElementById('groupName').textContent = group.name;
                currentInviteCode = group.inviteCode;
                document.getElementById('groupCode').textContent = `Invite Code: ${group.inviteCode}`;

                const membersHtml = group.members.map(m => {
                    const isMe = m.id === currentUser.id;
                    return `
                        <div class="list-item" style="padding: 0.5rem 0;">
                            <span>${m.name} ${isMe ? '<strong>(You)</strong>' : ''}</span>
                        </div>
                    `;
                }).join('');
                document.getElementById('membersContainer').innerHTML = membersHtml;

                loadDebts();
                loadExpenses();
            } catch (err) {
                alert('Failed to load group: ' + err.message);
                navigateTo('groups.html');
            }
        }

        function copyInvite() {
            navigator.clipboard.writeText(currentInviteCode);
            alert('Invite code copied: ' + currentInviteCode);
        }

        async function regenerateCode() {
            if (confirm('Regenerate invite code? The old code will stop working.')) {
                try {
                    await apiFetch(`/groups/${groupId}/regenerate-code`, { method: 'POST' });
                    loadGroupData();
                } catch (e) { alert(e.message); }
            }
        }

        async function deleteGroup() {
            if (confirm('Delete this group permanently?')) {
                try {
                    await apiFetch(`/groups/${groupId}`, { method: 'DELETE' });
                    navigateTo('groups.html');
                } catch (e) { alert(e.message); }
            }
        }

        async function loadDebts() {
            try {
                const debts = await apiFetch(`/expenses/group/${groupId}/debts`);
                const container = document.getElementById('debtsContainer');

                if (debts.length === 0) {
                    container.innerHTML = '<p class="text-success" style="padding: 1rem 0;">All settled up! No one owes anything. ✓</p>';
                    return;
                }

                container.innerHTML = debts.map(d => {
                    const isMePaying = d.from.id === currentUser.id;
                    const isMeReceiving = d.to.id === currentUser.id;
                    let text = `<strong>${d.from.name}</strong> owes <strong>${d.to.name}</strong>`;
                    let color = '';

                    if (isMePaying) {
                        text = `You owe <strong>${d.to.name}</strong>`;
                        color = 'negative';
                    } else if (isMeReceiving) {
                        text = `<strong>${d.from.name}</strong> owes you`;
                        color = 'positive';
                    }

                    return `
                        <div class="list-item" style="padding: 0.5rem 0;">
                            <span class="${color}">${text}</span>
                            <span class="amount ${color}">₹${d.amount.toFixed(2)}</span>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error('Failed to load debts:', err);
            }
        }

        async function deleteExpense(expId) {
            if (confirm('Delete this expense? Balances will be recalculated.')) {
                try {
                    await apiFetch(`/expenses/${expId}`, { method: 'DELETE' });
                    loadDebts();
                    loadExpenses();
                } catch (e) { alert(e.message); }
            }
        }

        async function loadExpenses() {
            try {
                const expenses = await apiFetch(`/expenses/group/${groupId}`);
                const container = document.getElementById('expensesContainer');

                if (expenses.length === 0) {
                    container.innerHTML = '<p class="text-muted" style="padding: 1rem 0;">No expenses yet. Add one to get started.</p>';
                    return;
                }

                container.innerHTML = expenses.map(e => {
                    const date = new Date(e.date).toLocaleDateString('en-IN', { month: 'short', day: 'numeric' });
                    const isMe = e.paidBy.id === currentUser.id;
                    const splitNames = e.splitBetween.map(u => u.id === currentUser.id ? 'You' : u.name).join(', ');
                    return `
                        <div class="list-item">
                            <div>
                                <h4 style="margin-bottom: 0.25rem;">${e.title}</h4>
                                <div class="text-muted" style="font-size: 0.85rem;">
                                    Paid by ${isMe ? 'You' : e.paidBy.name} on ${date}
                                    • Split: ${splitNames}
                                </div>
                            </div>
                            <div style="display: flex; align-items: center; gap: 1rem;">
                                <div class="amount" style="text-align: right;">₹${e.amount.toFixed(2)}</div>
                                <div style="display: flex; gap: 0.2rem;">
                                    <button onclick="navigateTo('add-expense.html?groupId=${groupId}&editId=${e.id}')" class="btn-icon" title="Edit Expense">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                                    </button>
                                    <button onclick="deleteExpense(${e.id})" class="btn-icon danger" title="Delete Expense">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error('Failed to load expenses:', err);
            }
        }

        loadGroupData();
    </script>
</body>
</html>
