<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairSplit | Groups</title>
    <link rel="stylesheet" href="css/styles.css">
<script>if(localStorage.getItem('theme')==='dark') document.documentElement.setAttribute('data-theme', 'dark');</script>
</head>
<body>
    <!-- Sidebar injected via JS -->

    <div class="main-content">
        <div style="margin-bottom: 2.5rem; margin-top: 1rem;">
            <h2>My Groups</h2>
            <p class="text-muted" style="margin-top: 0.2rem; display: flex; align-items: center; gap: 0.5rem;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Manage your split networks
            </p>
        </div>

        <div class="grid mb-3">
            <div class="card">
                <h3 class="mb-3" style="font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.8rem;">Create a Group</h3>
                <form id="createGroupForm">
                    <div class="form-group" style="margin-top: 1rem;">
                        <input type="text" id="groupName" placeholder="e.g. Trip to Paris" required>
                    </div>
                    <button type="submit" class="btn" style="width: 100%; background: var(--primary); color: white; border: none;">Create Group</button>
                    <div id="c-error" class="error-msg"></div>
                </form>
            </div>

            <div class="card">
                <h3 class="mb-3" style="font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.8rem;">Join a Group</h3>
                <form id="joinGroupForm">
                    <div class="form-group" style="margin-top: 1rem;">
                        <input type="text" id="inviteCode" placeholder="Enter Invite Code" required>
                    </div>
                    <button type="submit" class="btn" style="width: 100%; background: var(--primary); color: white; border: none;">Join Group</button>
                    <div id="j-error" class="error-msg"></div>
                </form>
            </div>
        </div>

        <div style="margin-top: 3rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-muted"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <h3 style="font-size: 1.2rem;">Your Active Groups</h3>
        </div>
        <div class="grid" id="groupsContainer">
            <!-- Groups injected here -->
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        checkAuth();
        renderSidebar('groups');

        async function loadGroups() {
            try {
                const groups = await apiFetch('/groups');
                const container = document.getElementById('groupsContainer');
                container.innerHTML = '';
                
                if (groups.length === 0) {
                    container.innerHTML = '<p class="text-muted">You are not in any groups yet.</p>';
                    return;
                }

                groups.forEach(g => {
                    container.innerHTML += `
                        <div class="card" style="cursor: pointer; transition: transform 0.2s;" onclick="navigateTo('group.html?id=${g.id}')" onmouseover="this.style.transform='translateY(-5px)'" onmouseout="this.style.transform='translateY(0)'">
                            <h3 class="mb-1">${g.name}</h3>
                            <p class="text-muted mb-2">${g.members.length} members</p>
                            <div class="text-muted" style="font-size: 0.8rem;">Invite Code: <strong>${g.inviteCode}</strong></div>
                        </div>
                    `;
                });
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('createGroupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const my_email = 'useracc@gmail.com'
            const my_pass = 'user321';
            const err = document.getElementById('c-error');
            const name = document.getElementById('groupName').value;
            try {
                err.style.display = 'none';
                await apiFetch(`/groups/create?name=${encodeURIComponent(name)}`, { method: 'POST' });
                document.getElementById('groupName').value = '';
                loadGroups();
            } catch (error) {
                err.textContent = error.message;
                err.style.display = 'block';
            }
        });

        document.getElementById('joinGroupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const err = document.getElementById('j-error');
            const code = document.getElementById('inviteCode').value;
            try {
                err.style.display = 'none';
                await apiFetch(`/groups/join?code=${encodeURIComponent(code)}`, { method: 'POST' });
                document.getElementById('inviteCode').value = '';
                loadGroups();
            } catch (error) {
                err.textContent = error.message;
                err.style.display = 'block';
            }
        });

        loadGroups();
    </script>
</body>
</html>
