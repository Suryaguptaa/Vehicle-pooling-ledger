<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairSplit | Add Expense</title>
    <link rel="stylesheet" href="css/styles.css">
<script>if(localStorage.getItem('theme')==='dark') document.documentElement.setAttribute('data-theme', 'dark');</script>
</head>
<body>
    <!-- Sidebar injected via JS -->

    <div class="main-content">
        <div class="header">
            <h2 id="pageTitle">Add an Expense</h2>
        </div>

        <div class="card" style="max-width: 600px;">
            <form id="addExpenseForm">
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="title" placeholder="e.g. Dinner at Mario's" required>
                </div>
                
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="amount" step="0.01" min="0.01" placeholder="0.00" required>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select id="category" required>
                        <option value="food">Food & Drink</option>
                        <option value="travel">Travel</option>
                        <option value="housing">Housing</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Who paid?</label>
                    <select id="paidBy" required></select>
                </div>

                <div class="form-group">
                    <label>Split equally between:</label>
                    <div id="splitBetweenContainer" style="padding: 1rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg);">
                        <!-- Checkboxes injected here -->
                    </div>
                </div>

                <div id="errorMsg" class="error-msg"></div>
                
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="button" class="btn btn-outline" onclick="window.history.back()">Cancel</button>
                    <button type="submit" class="btn" id="submitBtn">Save Expense</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        checkAuth();
        renderSidebar('groups');

        const params = new URLSearchParams(window.location.search);
        const groupId = params.get('groupId');
        const editId = params.get('editId');
        const currentUser = JSON.parse(localStorage.getItem('user'));

        if (!groupId) navigateTo('groups.html');
        
        if (editId) {
            document.getElementById('pageTitle').textContent = 'Edit Expense';
            document.getElementById('submitBtn').textContent = 'Update Expense';
        }

        async function loadData() {
            try {
                const group = await apiFetch(`/groups/${groupId}`);
                const paidBySelect = document.getElementById('paidBy');
                const splitContainer = document.getElementById('splitBetweenContainer');
                
                group.members.forEach(m => {
                    const isMe = m.id === currentUser.id;
                    paidBySelect.innerHTML += `<option value="${m.id}" ${isMe ? 'selected' : ''}>${m.name} ${isMe ? '(You)' : ''}</option>`;
                    
                    splitContainer.innerHTML += `
                        <div style="display: flex; align-items: center; margin-bottom: 0.5rem;">
                            <input type="checkbox" id="split_${m.id}" value="${m.id}" checked style="width: auto; margin-right: 0.5rem; margin-bottom: 0;">
                            <label for="split_${m.id}" style="margin-bottom: 0; font-weight: 400;">${m.name} ${isMe ? '(You)' : ''}</label>
                        </div>
                    `;
                });

                if (editId) {
                    const expenses = await apiFetch(`/expenses/group/${groupId}`);
                    const exp = expenses.find(e => e.id.toString() === editId);
                    if (exp) {
                        document.getElementById('title').value = exp.title;
                        document.getElementById('amount').value = exp.amount;
                        document.getElementById('category').value = exp.category;
                        document.getElementById('paidBy').value = exp.paidBy.id;
                        
                        // Reset checkboxes then check only the ones in splitBetween
                        document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                        exp.splitBetween.forEach(u => {
                            const cb = document.getElementById(`split_${u.id}`);
                            if (cb) cb.checked = true;
                        });
                    }
                }
            } catch (err) {
                alert('Failed to load group members');
                navigateTo('groups.html');
            }
        }

        document.getElementById('addExpenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const err = document.getElementById('errorMsg');
            const btn = document.getElementById('submitBtn');
            
            const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
            if (checkboxes.length === 0) {
                err.textContent = 'Must split between at least one person';
                err.style.display = 'block';
                return;
            }

            const splitBetween = Array.from(checkboxes).map(cb => ({ id: cb.value }));
            const payload = {
                title: document.getElementById('title').value,
                amount: parseFloat(document.getElementById('amount').value),
                category: document.getElementById('category').value,
                groupId: groupId,
                paidBy: { id: document.getElementById('paidBy').value },
                splitBetween: splitBetween
            };

            try {
                err.style.display = 'none';
                btn.textContent = 'Saving...';
                
                if (editId) {
                    await apiFetch(`/expenses/${editId}`, {
                        method: 'PUT',
                        body: JSON.stringify(payload)
                    });
                } else {
                    await apiFetch('/expenses/add', {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                }

                navigateTo(`group.html?id=${groupId}`);
            } catch (error) {
                err.textContent = error.message;
                err.style.display = 'block';
                btn.textContent = editId ? 'Update Expense' : 'Save Expense';
            }
        });

        loadData();
    </script>
</body>
</html>
